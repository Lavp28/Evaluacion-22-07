<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Ejemplo</title>

    <style>
        /*
        Las variables de CSS facilitan el mantenimiento de la página
        */

        :root{
            --primary-color: #816c8b;
            --white: #ffffff;
            --light-gray: #f4f4f4;
            --accent-color: grey;
        }

        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: var(--primary-color);
            color:black;
        }

        .formulariosCRM{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba (0,0,0, 0.1);

        }

        .btn{
            padding: 10px;
            background: var(--accent-color);
            color: #ffffff;
            border: none;
            cursor: pointer;
        }

    </style>       
</head>
<body>
    
    <header>
        <h1> Ejemplo de Formulario</h1>
    </header>

    <main>  
        <section id = "registro">
            <form action="#" class="formulariosCRM">
                <!-- Acá van las eqtiquetas asociadas a los imputs mediante el atributo "for"-->
                <div class="form-group"> 
                    <label for="nombre"> Nombre:</label>
                    <input type="text" name="nombre" id="nombre" required placeholder="Ronny" >
                </div>
                 <br>
                 
                 <div>
                    <label for="apellido"> Apellido:</label>
                    <input type="text" name="apellido" id="apellido" required placeholder="Sánchez">
                 </div>
                 <br>

                 <div class="form-group">
                    <label for="Edad"> Edad:</label>
                    <input type="number" name="Edad" id="Edad" required placeholder="23" min="0" max="100">
                 </div>
                 
                <br>
                 <div class="form-group">
                    <label type="email" id="email">Email:</label> 
                    <input type="emailtext" name="email" id="email" required placeholder="Example@gmail.com">
                 </div>    
                 <br>
                
                <div>
                 <select id="País" name="País">
                        <option value="">
                        Select country
                        </option>
                    
                        <option value="Ve">
                        Venezuela
                        </option>

                        <option value="Mx">
                        México
                        </option>
                    </select>
                </div>
                <label>
                    <input type="checkbox" name="Termino" id="Termino">
                    Acepta los términos y condiciones
                </label>

                <fieldset>
                    <legend>
                        Género
                    </legend>
                    
                    <input type="radio" name="genero" id="Masculino" value="M">
                    <label for="Masculino">Masculino</label>

                    <input type="radio" name="genero" id="Femenino" value="F">
                    <label for="Femenino">Femenino</label>
                </fieldset>

                <button type="submit" class="btn"> Enviar</button>

            </form>
        </section>
    </main>

    <footer>
        
    </footer>

</body>
</html>
